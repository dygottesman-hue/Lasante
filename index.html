<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>LaSante Health Center</title>
<style>
    :root {
        color-scheme: light;
        --brand-blue: #245fa9;
        --control-bg: rgba(12, 23, 42, 0.46);
        --control-bg-hover: rgba(12, 23, 42, 0.68);
    }

    * {
        box-sizing: border-box;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        margin: 0;
    }

    body {
        background: var(--brand-blue);
        font-family: Arial, Helvetica, sans-serif;
        overflow: hidden;
    }

    .carousel {
        position: relative;
        width: 100vw;
        height: 100vh;
        min-height: 100svh;
        background: var(--brand-blue);
    }

    .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        visibility: hidden;
        transition: opacity 700ms ease, visibility 700ms ease;
    }

    .slide.is-active {
        opacity: 1;
        visibility: visible;
    }

    .slide img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: var(--brand-blue);
    }

    .control {
        position: absolute;
        top: 50%;
        z-index: 2;
        width: 46px;
        height: 46px;
        border: 0;
        border-radius: 50%;
        color: #fff;
        background: var(--control-bg);
        cursor: pointer;
        font-size: 31px;
        line-height: 1;
        transform: translateY(-50%);
        transition: background 160ms ease, transform 160ms ease;
    }

    .control:hover,
    .control:focus-visible {
        background: var(--control-bg-hover);
        transform: translateY(-50%) scale(1.04);
        outline: none;
    }

    .control.prev {
        left: clamp(12px, 2vw, 28px);
    }

    .control.next {
        right: clamp(12px, 2vw, 28px);
    }

    .dots {
        position: absolute;
        right: 0;
        bottom: clamp(14px, 3vw, 30px);
        left: 0;
        z-index: 2;
        display: flex;
        justify-content: center;
        gap: 10px;
        pointer-events: none;
    }

    .dot {
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.85);
        border-radius: 50%;
        background: transparent;
        padding: 0;
        pointer-events: auto;
        cursor: pointer;
    }

    .dot.is-active {
        background: #fff;
    }

    @media (max-width: 700px) {
        .control {
            width: 40px;
            height: 40px;
            font-size: 26px;
        }

        .dot {
            width: 10px;
            height: 10px;
        }
    }
</style>
</head>
<body>
<main class="carousel" aria-label="LaSante slide presentation">
    <section class="slide is-active" aria-label="Award-winning care">
        <img src="assets/slides/award-care.png" alt="LaSante ranked as 2024's top performing FQHC provider by Healthfirst.">
    </section>
    <section class="slide" aria-label="Urgent care hours">
        <img src="assets/slides/urgent-care.png" alt="LaSante Urgent Care is now open with weekday and Sunday evening hours.">
    </section>
    <section class="slide" aria-label="Transportation">
        <img src="assets/slides/transportation.png" alt="LaSante transportation is available by calling or texting 718-246-5700.">
    </section>

    <button class="control prev" type="button" aria-label="Previous slide">&lsaquo;</button>
    <button class="control next" type="button" aria-label="Next slide">&rsaquo;</button>
    <div class="dots" aria-label="Slide navigation"></div>
</main>

<script>
    const slides = Array.from(document.querySelectorAll(".slide"));
    const dotsContainer = document.querySelector(".dots");
    const previousButton = document.querySelector(".prev");
    const nextButton = document.querySelector(".next");
    const intervalMs = 8000;
    let currentIndex = 0;
    let timerId;

    const dots = slides.map((_, index) => {
        const dot = document.createElement("button");
        dot.className = "dot";
        dot.type = "button";
        dot.setAttribute("aria-label", `Show slide ${index + 1}`);
        dot.addEventListener("click", () => showSlide(index));
        dotsContainer.appendChild(dot);
        return dot;
    });

    function showSlide(index) {
        currentIndex = (index + slides.length) % slides.length;

        slides.forEach((slide, slideIndex) => {
            const isActive = slideIndex === currentIndex;
            slide.classList.toggle("is-active", isActive);
            dots[slideIndex].classList.toggle("is-active", isActive);
        });

        restartTimer();
    }

    function nextSlide() {
        showSlide(currentIndex + 1);
    }

    function previousSlide() {
        showSlide(currentIndex - 1);
    }

    function restartTimer() {
        window.clearInterval(timerId);
        timerId = window.setInterval(nextSlide, intervalMs);
    }

    previousButton.addEventListener("click", previousSlide);
    nextButton.addEventListener("click", nextSlide);
    document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") previousSlide();
        if (event.key === "ArrowRight") nextSlide();
    });

    showSlide(0);
</script>
</body>
</html>
